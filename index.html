<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Goodluck Love</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle at top, #ffe6f0, #fff);
  overflow-x: hidden;
}

/* Button */
.open-btn {
  padding: 18px 30px;
  font-size: 20px;
  min-width: 220px;
  background: linear-gradient(135deg, #ff4d6d, #ff8fb3);
  color: white;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  box-shadow: 0 18px 35px rgba(255, 77, 109, 0.28);
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.open-btn:hover {
  transform: translateY(-2px) scale(1.03);
  box-shadow: 0 22px 45px rgba(255, 77, 109, 0.35);
}

/* Modal */
.modal {
  display: none;
  position: fixed;
  z-index: 5;
  left: 0; top: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.6);
}

/* 🔥 Bigger Responsive Modal */
.modal-content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 95%;
  max-width: 820px;
  height: 460px;
  border-radius: 20px;
  overflow: hidden;
  background: url('pics.png') center/cover no-repeat;
}

/* Overlay */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

/* Text */
.text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  text-align: center;
}

.text h2 {
  font-size: 30px;
}

.text p {
  font-size: 18px;
}

#message {
  border-right: 2px solid white;
  white-space: nowrap;
  overflow: hidden;
}

/* Close */
.close {
  position: absolute;
  top: 12px;
  right: 18px;
  color: white;
  font-size: 26px;
  cursor: pointer;
  z-index: 10;
}

/* Hearts */
.heart {
  position: fixed;
  font-size: 22px;
  animation: floatUp 4s linear forwards;
  z-index: 7;
}

@keyframes floatUp {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-700px); opacity: 0; }
}

.floating-letter {
  position: fixed;
  font-size: 24px;
  font-weight: 800;
  color: #ffd7e7;
  pointer-events: none;
  opacity: 0;
  animation: floatLetter 4s ease-out forwards;
  text-shadow: 0 0 16px rgba(255, 255, 255, 0.95);
  z-index: 999;
}

@keyframes floatLetter {
  0% {
    opacity: 0;
    transform: translateY(0) scale(0.9);
  }
  20% {
    opacity: 1;
    transform: translateY(-10px) scale(1.05);
  }
  100% {
    opacity: 0;
    transform: translateY(-220px) scale(0.9);
  }
}

/* Confetti */
.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  top: -10px;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(360deg);
  }
}
</style>
</head>

<body>

<button class="open-btn" onclick="openModal()">Click Me Please HUHU</button>

<div id="myModal" class="modal">
  <div class="modal-content">
    
    <span class="close" onclick="closeModal()">&times;</span>
    
    <div class="overlay"></div>

    <div class="text">
      <h2>GOODLUCK LOVE ❤️</h2>
      <p id="message"></p>
    </div>

  </div>
</div>

<!-- 🔊 Sound -->
<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
const text = "IM SO PROUD OF YOUUUUU!!! MWAPS 💖✨";
let i = 0;

function openModal() {
  document.getElementById("myModal").style.display = "block";

  // 🔊 Sound
  document.getElementById("clickSound").play();

  // ⏳ Typing
  i = 0;
  document.getElementById("message").innerHTML = "";
  typeWriter();

  // 🎉 Confetti
  createConfetti(180);
  createConfetti(180);

  // 💖 Hearts
  createHearts(55);
  createHearts(55);

  // ✨ Floating letters message
  createFloatingLetters();
  createFloatingLetters();
}

function closeModal() {
  document.getElementById("myModal").style.display = "none";
}

// Typing effect
function typeWriter() {
  if (i < text.length) {
    document.getElementById("message").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 35);
  }
}

// Confetti
function createConfetti(amount = 100) {
  for (let i = 0; i < amount; i++) {
    let c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.backgroundColor = randomColor();
    c.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
}

function randomColor() {
  const colors = ["red","blue","yellow","green","pink","purple","orange"];
  return colors[Math.floor(Math.random() * colors.length)];
}

// Hearts
function createHearts(amount = 30) {
  for (let i = 0; i < amount; i++) {
    let h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "💖";
    h.style.left = Math.random() * 100 + "vw";
    h.style.bottom = "0px";
    h.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 4000);
  }
}

function createFloatingLetters() {
  const message = "I love you so much. IM SO PROUD OF YOU";
  message.split("").forEach((letter, index) => {
    setTimeout(() => {
      if (letter === " ") return;
      const span = document.createElement("div");
      span.className = "floating-letter";
      span.textContent = letter;
      span.style.left = 5 + Math.random() * 90 + "vw";
      span.style.top = 6 + Math.random() * 10 + "vh";
      span.style.fontSize = 24 + Math.random() * 10 + "px";
      span.style.animationDuration = (Math.random() * 1.5 + 3) + "s";
      span.style.color = ["#ffffff", "#ffe6f2", "#ffb3d2", "#ff81b1", "#ff5c9d"][Math.floor(Math.random() * 5)];
      document.body.appendChild(span);
      setTimeout(() => span.remove(), 4500);
    }, index * 80);
  });
}

// Close outside
window.onclick = function(e) {
  let modal = document.getElementById("myModal");
  if (e.target == modal) {
    modal.style.display = "none";
  }
}
</script>

</body>
</html>
